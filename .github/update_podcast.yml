name: Automatisiertes Podcast Update

on:
  schedule:
    # Läuft jeden Freitag um 12:00 Uhr UTC (ca. 14:00 Uhr unserer Zeit)
    # Da Freitags meistens die neuen Sternengeschichten erscheinen.
    - cron: '0 12 * * 5'
  workflow_dispatch: # Ermöglicht es dir, das Update jederzeit manuell per Klick auf GitHub zu starten

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Erlaubt dem Bot, die neue episodes.json ins Repo zu pushen

    steps:
    - name: Code aus dem Repository auschecken
      uses: actions/checkout@v4

    - name: Python auf dem Server installieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Python-Bibliotheken installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Scraper-Skript ausführen
      run: python scraper.py

    - name: Änderungen prüfen und automatisch commiten
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add episodes.json
        
        # Nur commiten, wenn sich die episodes.json tatsächlich verändert hat (neue Folge online)
        if git diff --staged --quiet; then
          echo "Keine neuen Folgen gefunden. Alles up to date!"
        else
          git commit -m "Automatisches Update: Neue Sternengeschichten-Folgen hinzugefügt"
          git push
        fi