<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sternengeschichten - Kosmisches Netzwerk</title>
    <link rel="stylesheet" href="style.css">
    <!-- Einbindung der 3D-Graph Bibliothek -->
    <script src="https://unpkg.com/3d-force-graph"></script>
</head>
<body>
    <!-- Steuerungszentrale -->
    <div id="ui-container">
        <h1>Sternengeschichten</h1>
        <p class="subtitle">Interaktives 3D-Episoden-Netzwerk</p>
        
        <div class="controls">
            <label for="category-filter" style="font-size: 0.85rem; color: #aaa; display:block; margin-bottom:8px;">Themen-Fokus:</label>
            <select id="category-filter">
                <option value="all">Gesamtes Universum</option>
            </select>
        </div>
    </div>

    <!-- Der eigentliche 3D-Raum -->
    <div id="3d-graph"></div>

    <script src="script.js"></script>
</body>
</html>
